name: Backend CD - Deploy Backend Services to AKS

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Branch or tag to deploy"
        required: true
        default: main

env:
  NS: ecommerce
  IMAGE_TAG: ${{ github.sha }}-${{ github.run_id }}

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.deploy_ref }}
          fetch-depth: 0

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ secrets.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ secrets.AKS_CLUSTER_NAME }}

      - name: Debug — show repo tree
        run: |
          echo "Deploying ref: ${{ github.event.inputs.deploy_ref }}"
          echo "--- root ---"; ls -la
          echo "--- k8s ---"; ls -la k8s || true
          echo "--- k8s/backend ---"; ls -la k8s/backend || true

      - name: Replace backend images
        run: |
          set -euo pipefail
          sed -i "s#IMAGE_PRODUCT_PLACEHOLDER#${{ secrets.ACR_LOGIN_SERVER }}/product_service:${{ env.IMAGE_TAG }}#g" k8s/backend/deploy-product.yaml
          sed -i "s#IMAGE_ORDER_PLACEHOLDER#${{ secrets.ACR_LOGIN_SERVER }}/order_service:${{ env.IMAGE_TAG }}#g"   k8s/backend/deploy-order.yaml

      - name: Apply backend manifests
        run: |
          kubectl apply -n $NS -f k8s/backend/deploy-product.yaml
          kubectl apply -n $NS -f k8s/backend/deploy-order.yaml



      - name: Wait for rollouts
        run: |
            kubectl -n $NS rollout status deploy/product-service-w08e1
            kubectl -n $NS rollout status deploy/order-service-w08e1
